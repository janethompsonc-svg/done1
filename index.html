<style>
  :root {
    --bg: #fef3df;
    --bg-2: #fff8ea;
    --bg-3: #ffeacb;
    --char: #ffd9a8;
    --line: rgba(96, 38, 18, 0.08);
    --line-2: rgba(96, 38, 18, 0.16);
    --ink: #2c160b;
    --ink-2: rgba(44, 22, 11, 0.66);
    --ink-3: rgba(44, 22, 11, 0.42);
    --ink-dim: rgba(44, 22, 11, 0.24);
    --gold: #ffb547;
    --coral: #ff7a5a;
    --magenta: #ec5e8a;
    --lavender: #a78bdf;
    --twilight: #6c7cc4;
    --clay: #c44a3b;
    --grad: linear-gradient(135deg, #ffc857 0%, #ff8a5e 30%, #ec5e8a 60%, #a78bdf 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overflow: hidden;
  }
  body {
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 100vh; min-height: 100svh;
  }
  .syne { font-family: 'Syne', sans-serif; }

  /* SPLASH — sunset watercolor blooming on cream paper */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 100;
    overflow: hidden;
    background: #fef3df;
    animation: splashOut 0.7s cubic-bezier(0.65, 0, 0.35, 1) 2.0s forwards;
    pointer-events: auto;
  }
  @keyframes splashOut {
    0%   { opacity: 1; }
    100% { opacity: 0; pointer-events: none; visibility: hidden; }
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    mix-blend-mode: multiply;
    opacity: 0;
    will-change: transform, opacity;
  }
  .blob-gold {
    width: 110vmax; height: 110vmax;
    top: -35vmax; right: -25vmax;
    background: radial-gradient(circle, #ffc857 0%, rgba(255, 200, 87, 0) 65%);
    animation: blobIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards,
               blobOut 0.7s cubic-bezier(0.5, 0, 0.75, 0) 1.7s forwards;
  }
  .blob-coral {
    width: 100vmax; height: 100vmax;
    top: -15vmax; left: -30vmax;
    background: radial-gradient(circle, #ff8a5e 0%, rgba(255, 138, 94, 0) 65%);
    animation: blobIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards,
               blobOut 0.7s cubic-bezier(0.5, 0, 0.75, 0) 1.7s forwards;
  }
  .blob-pink {
    width: 95vmax; height: 95vmax;
    bottom: -25vmax; right: -5vmax;
    background: radial-gradient(circle, #ec5e8a 0%, rgba(236, 94, 138, 0) 65%);
    animation: blobIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards,
               blobOut 0.7s cubic-bezier(0.5, 0, 0.75, 0) 1.7s forwards;
  }
  .blob-lavender {
    width: 85vmax; height: 85vmax;
    bottom: -20vmax; left: -15vmax;
    background: radial-gradient(circle, #a78bdf 0%, rgba(167, 139, 223, 0) 65%);
    animation: blobIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards,
               blobOut 0.7s cubic-bezier(0.5, 0, 0.75, 0) 1.7s forwards;
  }
  @keyframes blobIn {
    0%   { opacity: 0; transform: scale(0.4) translateY(20px); }
    100% { opacity: 0.72; transform: scale(1) translateY(0); }
  }
  @keyframes blobOut {
    0%   { opacity: 0.72; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.4); }
  }
  .splash-logo {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.7);
    animation: logoIn 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) 0.95s forwards,
               logoOut 0.55s cubic-bezier(0.5, 0, 0.75, 0) 1.85s forwards;
  }
  .splash-wordmark {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(52px, 13vw, 90px);
    letter-spacing: -0.035em;
    color: #2c160b;
    text-shadow:
      0 1px 1px rgba(255, 255, 255, 0.7),
      0 0 40px rgba(255, 180, 100, 0.45),
      0 0 80px rgba(236, 94, 138, 0.25);
    line-height: 1;
  }
  .splash-wordmark .percent {
    background: linear-gradient(135deg, #ff6a4a, #ec5e8a 60%, #a78bdf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }
  .splash-tagline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4em;
    color: rgba(44, 22, 11, 0.55);
    margin-top: 22px;
    text-indent: 0.4em;
  }
  @keyframes logoIn {
    0%   { opacity: 0; transform: scale(0.7); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes logoOut {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.06); }
  }

  /* MAIN APP */
  .main-app {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    opacity: 0;
    animation: appIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 2.2s forwards;
  }
  @keyframes appIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .main-app::before {
    content: "";
    position: fixed;
    inset: -10vmax;
    background:
      radial-gradient(40vmax 40vmax at 15% 10%, rgba(255, 200, 87, 0.18), transparent 70%),
      radial-gradient(35vmax 35vmax at 85% 0%, rgba(236, 94, 138, 0.12), transparent 70%),
      radial-gradient(40vmax 40vmax at 50% 100%, rgba(167, 139, 223, 0.12), transparent 70%);
    pointer-events: none;
    z-index: -1;
  }

  .brand-strip {
    flex-shrink: 0;
    padding: max(20px, env(safe-area-inset-top)) 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand-mark {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand-mark .percent {
    background: var(--grad);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    animation: shift 6s linear infinite;
  }
  @keyframes shift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .brand-date {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }

  .ego {
    margin: 14px 20px 18px;
    border-radius: 20px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--line);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.6) inset, 0 6px 20px rgba(184, 100, 60, 0.05);
  }
  .ego::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--grad);
    opacity: 0.85;
  }
  .ego-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--ink-2);
    margin-bottom: 10px;
  }
  .ego-label .ping {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--coral);
    box-shadow: 0 0 12px var(--coral);
    animation: ping 2.4s ease-in-out infinite;
  }
  @keyframes ping {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.8); }
  }
  .ego-prompt {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink);
    font-weight: 400;
    font-style: italic;
  }
  .ego-prompt::before { content: "“"; color: var(--coral); margin-right: 2px; opacity: 0.6; }
  .ego-prompt::after  { content: "”"; color: var(--coral); margin-left: 2px; opacity: 0.6; }

  .section-head {
    padding: 0 24px 10px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--ink-2);
  }
  .section-count {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-3);
    letter-spacing: 0.1em;
  }

  .list-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 120px;
  }
  ul.task-list { list-style: none; padding: 0 20px; }

  .task {
    position: relative;
    margin-bottom: 10px;
    border-radius: 18px;
    overflow: visible;
    background: transparent;
  }
  .task-bg-layer {
    position: absolute; inset: 0;
    border-radius: 18px;
    overflow: hidden;
    pointer-events: none;
  }
  .task .swipe-bg {
    position: absolute; inset: 0;
    display: flex;
    align-items: center;
    padding: 0 26px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .12s;
    color: white;
  }
  .task .swipe-bg.right {
    background: linear-gradient(90deg, rgba(255, 200, 87, 0.4), rgba(255, 138, 94, 0.85) 30%, rgba(236, 94, 138, 0.95) 60%, rgba(167, 139, 223, 1));
    justify-content: flex-start;
    color: white;
  }
  .task .swipe-bg.left {
    background: linear-gradient(90deg, transparent, rgba(196, 74, 59, 0.45) 30%, rgba(180, 56, 42, 0.95) 100%);
    justify-content: flex-end;
    color: #fff7ed;
  }

  .task .card {
    position: relative;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px 22px;
    min-height: 64px;
    display: flex;
    align-items: center;
    transition: transform .26s cubic-bezier(.22, 1, .36, 1), background .25s, border-color .25s;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset, 0 4px 14px rgba(184, 100, 60, 0.05);
  }
  .task .card.swiping { transition: none; }
  .task .text {
    flex: 1;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.4;
    word-break: break-word;
    letter-spacing: -0.005em;
  }
  .task.done .card {
    background: linear-gradient(135deg, rgba(255, 200, 87, 0.18), rgba(236, 94, 138, 0.10), rgba(167, 139, 223, 0.12));
    border-color: rgba(236, 94, 138, 0.22);
  }
  .task.done .text {
    color: var(--ink-3);
    text-decoration: line-through;
    text-decoration-color: rgba(236, 94, 138, 0.7);
    text-decoration-thickness: 1.5px;
  }

  .task .edit-input {
    flex: 1;
    background: transparent;
    border: 0;
    border-bottom: 1.5px solid var(--coral);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    padding: 4px 0;
    outline: none;
    width: 100%;
  }

  .particle-layer {
    position: absolute;
    top: 50%;
    right: 24px;
    pointer-events: none;
    z-index: 5;
  }
  .particle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: burst 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    will-change: transform, opacity;
  }
  @keyframes burst {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0.15); opacity: 0; }
  }

  .empty {
    text-align: center;
    padding: 60px 32px;
    color: var(--ink-dim);
  }
  .empty .glyph {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 200, 87, 0.65) 0%, rgba(236, 94, 138, 0.35) 40%, rgba(167, 139, 223, 0.18) 70%, transparent 85%);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%      { transform: scale(1.18); opacity: 1; }
  }
  .empty .head {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .empty .sub {
    margin-top: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  .fab {
    position: fixed;
    bottom: max(24px, env(safe-area-inset-bottom));
    right: 24px;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--grad);
    background-size: 220% 220%;
    background-position: 0% 50%;
    color: #fff;
    border: 0;
    font-size: 32px;
    font-weight: 300;
    font-family: 'Syne', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow:
      0 10px 28px rgba(236, 94, 138, 0.35),
      0 4px 12px rgba(255, 138, 94, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.45);
    transition: transform .15s, box-shadow .15s, background-position .4s;
    z-index: 50;
    animation: shift 8s linear infinite;
  }
  .fab:active { transform: scale(0.92); }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(254, 243, 223, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    padding: 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }
  .modal-bg.show { opacity: 1; pointer-events: auto; }
  .modal-card {
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-radius: 24px;
    padding: 24px;
    width: 100%;
    max-width: 500px;
    transform: translateY(40px);
    transition: transform .35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(120, 50, 30, 0.18);
  }
  .modal-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--grad);
    opacity: 0.9;
  }
  .modal-bg.show .modal-card { transform: translateY(0); }
  .modal-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--ink-2);
    margin-bottom: 14px;
  }
  .modal-input {
    width: 100%;
    background: transparent;
    border: 0;
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.3;
    padding: 0 0 16px;
    outline: none;
    border-bottom: 1px solid var(--line);
  }
  .modal-input::placeholder { color: var(--ink-dim); }
  .modal-actions {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .modal-actions button {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    border: 1px solid var(--line-2);
    background: transparent;
    color: var(--ink-2);
    padding: 12px 22px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
  }
  .modal-actions button.primary {
    background: var(--grad);
    background-size: 200% 200%;
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 18px rgba(236, 94, 138, 0.3);
    animation: shift 6s linear infinite;
  }
  .modal-actions button.primary:active { transform: scale(0.96); }
  .modal-actions button:hover { border-color: var(--ink-2); color: var(--ink); }

  .task.removing {
    animation: slideOut .32s cubic-bezier(0.5, 0, 0.75, 0) forwards;
    pointer-events: none;
  }
  @keyframes slideOut {
    0%   { transform: translateX(0); opacity: 1; max-height: 100px; margin-bottom: 10px; }
    60%  { opacity: 0; }
    100% { transform: translateX(-120%); opacity: 0; max-height: 0; margin-bottom: 0; padding: 0; }
  }
  .task.adding { animation: slideIn .3s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes slideIn {
    0%   { transform: translateY(-6px); opacity: 0; }
    100% { transform: none; opacity: 1; }
  }

  .tip {
    position: fixed;
    bottom: max(28px, env(safe-area-inset-bottom));
    left: 24px;
    right: 100px;
    pointer-events: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
    z-index: 40;
  }
  .tip .sep { color: var(--coral); margin: 0 6px; opacity: 0.6; }

  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
"use strict";

const STORAGE_KEY = "donepercent.v1";

const EGO_PROMPTS = [
  "Put ego aside today. Reach out to someone you miss — drop the script and initiate.",
  "Tell someone exactly what you noticed about them. Out loud. No hedging.",
  "Apologize for the small thing you've been pretending didn't happen. Watch the air shift.",
  "Drop the script. Say the awkward, honest thing you've been editing out of your sentences.",
  "Initiate. The pride of being right isn't worth the cost of being apart.",
  "Compliment a stranger today. Notice how it changes the room before you've even left.",
  "Forgive the version of you who didn't know better. They were doing what they could.",
  "Ask the question you've been avoiding because the answer might require you to change.",
  "Send the message that begins with 'I've been thinking about you.' No payoff needed.",
  "Tell the truth about how you're actually doing. The polite version is costing you.",
  "Be the first one to soften. Pride is a poor substitute for closeness.",
  "Show up early. Just to listen, not to be witnessed.",
  "Praise without footnotes. Say something kind and let it land undiluted.",
  "Make the call you keep putting off until 'tomorrow.' It's been Wednesday for two weeks.",
  "Be the warm person you needed when you were younger.",
  "Reach toward, not against. Even when you're right.",
  "The bravest thing you can do today is be the one who texts first.",
];

const PARTICLE_COLORS = ["#ffc857", "#ff9f5e", "#ff7a5a", "#ec5e8a", "#a78bdf", "#ffd57a", "#fff5e0", "#d44d7d"];

const todayShort = () => {
  const d = new Date();
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" }).toUpperCase();
};
const dayOfYear = (d) => {
  const s = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - s) / 86400000);
};
const todayPrompt = () => EGO_PROMPTS[dayOfYear(new Date()) % EGO_PROMPTS.length];

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(t => t && t.id && typeof t.text === "string");
  } catch (e) { return []; }
}
function saveTasks(tasks) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (e) {}
}
const uid = () => "t_" + Math.random().toString(36).slice(2, 10);

function Splash() {
  return (
    <div className="splash">
      <div className="blob blob-gold" />
      <div className="blob blob-coral" />
      <div className="blob blob-pink" />
      <div className="blob blob-lavender" />
      <div className="splash-logo">
        <div className="splash-wordmark">
          D.ONE<span className="percent">%</span>
        </div>
        <div className="splash-tagline">Mapping your cosmic expansion</div>
      </div>
    </div>
  );
}

function EgoBanner() {
  return (
    <div className="ego">
      <div className="ego-label">
        <span className="ping" />
        <span>Ego Check &middot; Today</span>
      </div>
      <p className="ego-prompt">{todayPrompt()}</p>
    </div>
  );
}

function spawnBurst(container) {
  if (!container) return;
  const count = 22;
  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const angle = (Math.random() - 0.5) * Math.PI * 1.1;
    const dist = 60 + Math.random() * 90;
    const tx = Math.cos(angle) * dist + 20;
    const ty = Math.sin(angle) * dist;
    p.style.setProperty("--tx", `${tx}px`);
    p.style.setProperty("--ty", `${ty}px`);
    const color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    p.style.background = color;
    p.style.boxShadow = `0 0 10px ${color}`;
    p.style.animationDelay = `${Math.random() * 60}ms`;
    container.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }
}

function TaskCard({ task, isAdded, onToggle, onDelete, onEdit }) {
  const cardRef = React.useRef(null);
  const swipeBgRef = React.useRef(null);
  const particleRef = React.useRef(null);
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(task.text);

  const stateRef = React.useRef({
    startX: null, startY: null, dx: 0, mode: null,
    lastTapTime: 0,
  });
  const thresholdRatio = 0.32;

  React.useEffect(() => { setDraft(task.text); }, [task.text]);

  const start = (clientX, clientY) => {
    stateRef.current = { ...stateRef.current, startX: clientX, startY: clientY, dx: 0, mode: null };
    if (cardRef.current) cardRef.current.classList.add("swiping");
  };
  const move = (clientX, clientY, e) => {
    const st = stateRef.current;
    if (st.startX === null) return;
    const moveX = clientX - st.startX;
    const moveY = clientY - st.startY;
    if (!st.mode) {
      if (Math.abs(moveX) > 8 && Math.abs(moveX) > Math.abs(moveY) + 4) st.mode = "swipe";
      else if (Math.abs(moveY) > 10) {
        st.mode = "scroll";
        if (cardRef.current) cardRef.current.classList.remove("swiping");
        return;
      }
    }
    if (st.mode === "swipe") {
      if (e && e.cancelable) e.preventDefault();
      st.dx = moveX;
      cardRef.current.style.transform = `translateX(${moveX}px)`;
      const bg = swipeBgRef.current;
      if (bg) {
        if (moveX > 0) { bg.className = "swipe-bg right"; bg.textContent = "Complete  →"; }
        else { bg.className = "swipe-bg left"; bg.textContent = "←  Clear"; }
        const w = cardRef.current.offsetWidth;
        bg.style.opacity = String(Math.min(Math.abs(moveX) / (w * thresholdRatio), 1));
      }
    }
  };
  const end = () => {
    const st = stateRef.current;
    if (cardRef.current) cardRef.current.classList.remove("swiping");
    if (st.startX === null) return;
    const card = cardRef.current;
    const bg = swipeBgRef.current;
    const w = card ? card.offsetWidth : 0;
    const finalDx = st.dx;
    const wasMode = st.mode;
    stateRef.current = { ...stateRef.current, startX: null, startY: null, dx: 0, mode: null };

    if (wasMode === "swipe") {
      if (finalDx > w * thresholdRatio) {
        spawnBurst(particleRef.current);
        if (card) card.style.transform = `translateX(${w * 0.18}px)`;
        setTimeout(() => {
          if (card) {
            card.style.transform = "translateX(0)";
            if (bg) bg.style.opacity = "0";
          }
          onToggle(task.id);
        }, 220);
      } else if (finalDx < -w * thresholdRatio) {
        const li = card?.closest("li");
        if (li) li.classList.add("removing");
        setTimeout(() => onDelete(task.id), 300);
      } else {
        if (card) card.style.transform = "translateX(0)";
        if (bg) bg.style.opacity = "0";
      }
    } else if (wasMode === null) {
      const now = Date.now();
      if (now - st.lastTapTime < 350) {
        st.lastTapTime = 0;
        setEditing(true);
      } else {
        st.lastTapTime = now;
      }
    }
  };

  const finishEdit = (commit) => {
    const next = draft.trim();
    setEditing(false);
    if (commit && next && next !== task.text) onEdit(task.id, next);
    else if (!next) setDraft(task.text);
    else setDraft(next);
  };

  return (
    <li className={"task" + (task.done ? " done" : "") + (isAdded ? " adding" : "")}>
      <div className="task-bg-layer">
        <div className="swipe-bg" ref={swipeBgRef} />
      </div>
      <div className="particle-layer" ref={particleRef} />
      <div
        className="card"
        ref={cardRef}
        onTouchStart={editing ? undefined : (e) => { const t = e.touches[0]; start(t.clientX, t.clientY); }}
        onTouchMove={editing ? undefined : (e) => { const t = e.touches[0]; move(t.clientX, t.clientY, e); }}
        onTouchEnd={editing ? undefined : end}
        onTouchCancel={editing ? undefined : () => {
          stateRef.current = { ...stateRef.current, startX: null, startY: null, dx: 0, mode: null };
          if (cardRef.current) {
            cardRef.current.classList.remove("swiping");
            cardRef.current.style.transform = "translateX(0)";
          }
          if (swipeBgRef.current) swipeBgRef.current.style.opacity = "0";
        }}
        onMouseDown={editing ? undefined : (e) => start(e.clientX, e.clientY)}
        onMouseMove={editing ? undefined : (e) => {
          if (stateRef.current.startX !== null) move(e.clientX, e.clientY, null);
        }}
        onMouseUp={editing ? undefined : end}
        onMouseLeave={editing ? undefined : () => { if (stateRef.current.startX !== null) end(); }}
        onDoubleClick={(e) => { e.preventDefault(); setEditing(true); }}
      >
        {editing ? (
          <input
            className="edit-input"
            autoFocus
            value={draft}
            maxLength={200}
            onChange={(e) => setDraft(e.target.value)}
            onBlur={() => finishEdit(true)}
            onKeyDown={(e) => {
              if (e.key === "Enter") { e.preventDefault(); finishEdit(true); }
              if (e.key === "Escape") { setDraft(task.text); setEditing(false); }
            }}
            onFocus={(e) => { const v = e.target.value; e.target.setSelectionRange(v.length, v.length); }}
          />
        ) : (
          <span className="text">{task.text}</span>
        )}
      </div>
    </li>
  );
}

function AddModal({ open, onClose, onAdd }) {
  const [value, setValue] = React.useState("");
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setValue("");
      setTimeout(() => { inputRef.current?.focus(); }, 220);
    }
  }, [open]);

  const submit = (e) => {
    e?.preventDefault();
    const v = value.trim();
    if (!v) { onClose(); return; }
    onAdd(v);
    setValue("");
    onClose();
  };

  return (
    <div className={"modal-bg" + (open ? " show" : "")} onClick={onClose}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()}>
        <div className="modal-label">New Trajectory</div>
        <form onSubmit={submit}>
          <input
            ref={inputRef}
            className="modal-input"
            placeholder="What needs to be done?"
            value={value}
            maxLength={200}
            onChange={(e) => setValue(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Escape") onClose(); }}
          />
          <div className="modal-actions">
            <button type="button" onClick={onClose}>Cancel</button>
            <button type="submit" className="primary">Add</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [tasks, setTasks] = React.useState(loadTasks);
  const [splashGone, setSplashGone] = React.useState(false);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [lastAddedId, setLastAddedId] = React.useState(null);

  React.useEffect(() => { saveTasks(tasks); }, [tasks]);

  React.useEffect(() => {
    if (tasks.length === 0 && !localStorage.getItem(STORAGE_KEY + ".seeded")) {
      setTasks([
        { id: uid(), text: "Swipe right to complete — catch the sunset burst", done: false },
        { id: uid(), text: "Swipe left to clear (swiftly)", done: false },
        { id: uid(), text: "Double tap me to edit", done: false },
      ]);
      localStorage.setItem(STORAGE_KEY + ".seeded", "1");
    }
  }, []);

  React.useEffect(() => {
    const t = setTimeout(() => setSplashGone(true), 2650);
    return () => clearTimeout(t);
  }, []);

  const addTask = (text) => {
    const id = uid();
    setTasks((prev) => [...prev, { id, text, done: false }]);
    setLastAddedId(id);
    setTimeout(() => setLastAddedId(null), 350);
  };
  const toggleTask = (id) => {
    setTasks((prev) => prev.map((t) => (t.id === id ? { ...t, done: !t.done } : t)));
  };
  const deleteTask = (id) => setTasks((prev) => prev.filter((t) => t.id !== id));
  const editTask = (id, text) => {
    setTasks((prev) => prev.map((t) => (t.id === id ? { ...t, text } : t)));
  };

  const active = tasks.filter(t => !t.done).length;
  const done = tasks.length - active;

  return (
    <>
      {!splashGone && <Splash />}
      <div className="main-app">
        <div className="brand-strip">
          <div className="brand-mark syne">
            D.ONE<span className="percent">%</span>
          </div>
          <div className="brand-date">{todayShort()}</div>
        </div>

        <EgoBanner />

        <div className="section-head">
          <span className="section-title">Trajectory</span>
          <span className="section-count">{active} open &middot; {done} done</span>
        </div>

        <div className="list-scroll">
          {tasks.length === 0 ? (
            <div className="empty">
              <div className="glyph" />
              <div className="head">Nothing in orbit.</div>
              <div className="sub">Tap + to begin</div>
            </div>
          ) : (
            <ul className="task-list">
              {tasks.map((t) => (
                <TaskCard
                  key={t.id}
                  task={t}
                  isAdded={t.id === lastAddedId}
                  onToggle={toggleTask}
                  onDelete={deleteTask}
                  onEdit={editTask}
                />
              ))}
            </ul>
          )}
        </div>

        <div className="tip">
          swipe right<span className="sep">·</span>complete
          <span className="sep">·</span>swipe left<span className="sep">·</span>clear
          <span className="sep">·</span>double tap<span className="sep">·</span>edit
        </div>

        <button className="fab" aria-label="Add task" onClick={() => setModalOpen(true)}>+</button>

        <AddModal open={modalOpen} onClose={() => setModalOpen(false)} onAdd={addTask} />
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
